services:
  - type: web
    name: anthology-discord-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_ENABLED
        value: "1"
      - key: BOT_DISPLAY_NAME
        value: Юра Семецкий
